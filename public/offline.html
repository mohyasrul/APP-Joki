<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Offline | Jokskuy</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 400px;
            padding: 2rem;
        }

        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            background-color: #fee2e2;
            color: #ef4444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            margin: 0 0 0.5rem 0;
            color: #1e293b;
        }

        p {
            color: #64748b;
            margin: 0 0 2rem 0;
            line-height: 1.5;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #6366f1;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            text-decoration: none;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: #4f46e5;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" viewBox="0 0 256 256">
                <path
                    d="M213.92,216.62l-176-184A8,8,0,1,0,26.08,43.38l22.18,23.2A103.11,103.11,0,0,0,32,128a104,104,0,0,0,192,0,103.11,103.11,0,0,0-16.26-61.42l20.18,21.1A8,8,0,1,0,213.92,216.62ZM128,216a88,88,0,0,1-88-88,87.6,87.6,0,0,1,12.78-45.65L181.65,216.89A87.6,87.6,0,0,1,128,216ZM141.6,40.75A88,88,0,0,1,216,128a88.66,88.66,0,0,1-8.24,37.36l11.41,11.93A104,104,0,0,0,137.28,25.21,8,8,0,0,0,141.6,40.75Z">
                </path>
            </svg>
        </div>
        <h1>Tidak Ada Koneksi</h1>
        <p>Sepertinya kamu sedang offline. Pastikan koneksi internet kamu stabil untuk mengakses Jokskuy.</p>
        <button class="btn" onclick="window.location.reload()">Coba Lagi</button>
    </div>
</body>

</html>
